site_name: FinPilot Documentation
site_description: AI-powered stock analysis platform with DRL agents
site_url: ""
repo_url: https://github.com/finpilot/borsa
repo_name: finpilot/borsa

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true

docs_dir: docs

nav:
  - Home:
      - Overview: index.md
      - Dependencies: DEPENDENCIES.md
      - Evolution Timeline: FINPILOT_EVOLUTION_TIMELINE.md
  - Architecture:
      - Core Migration Guide: CORE_MIGRATION_GUIDE.md
      - Integration Plan: INTEGRATION_PLAN.md
      - Infrastructure Roadmap: INFRASTRUCTURE_ACCELERATION_ROADMAP.md
      - Gap Analysis: GAP_ANALYSIS_REPORT.md
      - Gap Analysis v3: gap_analysis_v3.md
  - DRL & ML:
      - Academic Analysis: ACADEMIC_DRL_ANALYSIS.md
      - Comprehensive Analysis: DRL_COMPREHENSIVE_ANALYSIS.md
      - Agent Analysis: DRL_AGENT_ANALYSIS.md
      - Improvement Roadmap: DRL_IMPROVEMENT_ROADMAP.md
      - Parallel Testing Guide: DRL_PARALLEL_TESTING_GUIDE.md
      - Workflow Alternatives: DRL_WORKFLOW_ALTERNATIF.md
      - Entegrasyon Değerlendirme: drl_entegrasyon_degerlendirme.md
      - Next Steps: drl_next_steps.md
      - Sprint 1 Report: drl_sprint1_completion_report.md
      - Trend Agent (Sprint 23): trend_agent_sprint23.md
      - Z-Score Calibration: zscore_calibration.md
  - Deployment:
      - Demo Deployment: DEMO_DEPLOYMENT.md
      - Demo to Real Roadmap: DEMO_TO_REAL_ROADMAP.md
      - Paper Trading Guide: PAPER_TRADING_GUIDE.md
      - Ollama Setup: OLLAMA_SETUP.md
  - Guides:
