name: FinPilot CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================
  # 🧪 Test Job - Unit & Integration Tests
  # ============================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🧪 Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=scanner --cov=drl --cov=views --cov=auth --cov=core \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=40
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # 🔍 Lint Job - Code Quality
  # ============================================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install linters
        run: |
          pip install ruff black isort mypy

      - name: 🔍 Run Ruff (linting)
        run: |
          ruff check scanner/ drl/ --ignore E501,F401
        continue-on-error: true

      - name: 🎨 Check Black formatting
        run: |
          black --check scanner/ drl/ --line-length 100
        continue-on-error: true

      - name: 📋 Check import sorting
        run: |
          isort --check-only scanner/ drl/
        continue-on-error: true

  # ============================================
  # 🔒 Security Job - Vulnerability & Secret Scanning
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install security tools
        run: |
          pip install bandit safety

      - name: 🔒 Run Bandit (security linter)
        run: |
          bandit -r scanner/ drl/ core/ auth/ views/ -ll -ii --skip B101
        continue-on-error: true

      - name: 🛡️ Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --full-report
        continue-on-error: true

      - name: 🔐 Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          if git grep -n -E '(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*"[A-Za-z0-9+/]{20,}"' -- '*.py' ':!.env.example' ':!*test*'; then
            echo "::error::Potential hardcoded secret found in source code!"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "❌ Secret scan failed. Move secrets to .env file."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected."

  # ============================================
  # 🐳 Docker Job - Build & Validate
  # ============================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: finpilot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 📊 Scanner Test Job - Integration
  # ============================================
  scanner-integration:
    name: 📊 Scanner Integration
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📊 Test scanner module imports
        run: |
          python -c "
          from scanner import indicators, signals, data_fetcher, config
          from scanner import add_indicators, fetch, load_symbols
          print('✅ All scanner modules import successfully')
          "

      - name: 🧪 Run indicator calculations
        run: |
          python -c "
          import pandas as pd
          import numpy as np
          from scanner.indicators import ema, rsi, macd_hist, add_indicators

          # Test with sample data
          prices = pd.Series(np.random.random(100) * 50 + 100)

          assert len(ema(prices, 20)) == 100
          assert len(rsi(prices, 14)) == 100
          assert len(macd_hist(prices)) == 100

          print('✅ Indicator calculations verified')
          "

  # ============================================
  # 🤖 DRL Model Validation & Deploy Pipeline
  # ============================================
  drl-pipeline:
    name: 🤖 DRL Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install DRL dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-rl.txt 2>/dev/null || echo "No RL requirements file"

      - name: 🔍 Validate DRL module imports
        run: |
          python -c "
          try:
              from drl.config import DRLConfig
              from drl.market_env import TradingEnv
              print('✅ DRL modules import OK')
          except ImportError as e:
              print(f'⚠️ DRL import warning: {e}')
          "

      - name: 🧪 DRL unit tests
        run: |
          python -m pytest tests/test_drl_integration.py -v --tb=short || echo "DRL tests skipped"

      - name: 📦 Package model artifacts
        run: |
          mkdir -p dist/models
          if [ -d "models" ] && [ "$(ls -A models/ 2>/dev/null)" ]; then
            cp models/*.zip dist/models/ 2>/dev/null || true
            echo "✅ Model artifacts packaged"
          else
            echo "ℹ️ No trained models found — training required before deploy"
          fi

      - name: 📊 DRL pipeline summary
        run: |
          echo "## 🤖 DRL Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Python: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist/models" ] && [ "$(ls -A dist/models/ 2>/dev/null)" ]; then
            echo "- Models: $(ls dist/models/ | wc -l) artifacts ready" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Models: No artifacts (training needed)" >> $GITHUB_STEP_SUMMARY
          fi
