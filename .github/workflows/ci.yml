name: FinPilot CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================
  # 🧪 Test Job - Unit & Integration Tests
  # ============================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pyjwt pydantic-settings bcrypt slowapi

      - name: 🧪 Run tests with coverage
        run: |
          python -m pytest tests/ --ignore=tests/test_views_integration.py -v \
            --cov=scanner --cov=drl --cov=core --cov=auth --cov=api \
            --cov=broker --cov=llm --cov=views \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # 🔍 Lint Job - Code Quality
  # ============================================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install linters
        run: |
          pip install ruff mypy

      - name: 🔍 Run Ruff (lint + format check)
        run: |
          ruff check scanner/ drl/ core/ auth/ views/ llm/ broker/ --ignore E501
          ruff format --check scanner/ drl/ core/ auth/ views/ llm/ broker/ --line-length 100

      - name: 🔬 Run mypy (basic type check)
        run: |
          pip install -r requirements.txt
          mypy scanner/ drl/ core/ --ignore-missing-imports --no-error-summary 2>&1 | head -50 || true
          echo "✅ mypy check completed (informational)"

  # ============================================
  # 🌐 Frontend Job - Lint + Test + Build
  # ============================================
  frontend:
    name: 🌐 Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npx next lint --quiet || true

      - name: 🧪 Test (Vitest)
        run: npx vitest run

      - name: 🏗️ Build
        run: npm run build

  # ============================================
  # 🔒 Security Job - Vulnerability & Secret Scanning
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install security tools
        run: |
          pip install bandit safety

      - name: 🔒 Run Bandit (security linter)
        run: |
          bandit -r scanner/ drl/ core/ auth/ views/ -ll -ii --skip B101
        continue-on-error: true

      - name: 🛡️ Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --full-report
        continue-on-error: true

      - name: 🔐 Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          if git grep -n -E '(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*"[A-Za-z0-9+/]{20,}"' -- '*.py' ':!.env.example' ':!*test*'; then
            echo "::error::Potential hardcoded secret found in source code!"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "❌ Secret scan failed. Move secrets to .env file."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected."

  # ============================================
  # 🐳 Docker Job - Build & Validate
  # ============================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint, frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: finpilot:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build FastAPI image
        run: docker build -f api/Dockerfile -t finpilot-api:${{ github.sha }} .

      - name: 🏗️ Build Next.js image
        run: docker build -f web/Dockerfile -t finpilot-web:${{ github.sha }} ./web

      - name: 🩺 Docker smoke test
        run: |
          # Start container in background
          SECRET_KEY=ci-test-key-not-for-production  # pragma: allowlist secret
          docker run -d --name finpilot-smoke \
            -e FINPILOT_SECRET_KEY="$SECRET_KEY" \
            -p 8501:8501 \
            finpilot:${{ github.sha }}

          # Wait for health check (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health > /dev/null 2>&1; then
              echo "✅ Health check passed after ${i}s"
              docker logs finpilot-smoke --tail 5
              docker stop finpilot-smoke && docker rm finpilot-smoke
              exit 0
            fi
            sleep 1
          done

          echo "❌ Health check failed after 30s"
          docker logs finpilot-smoke --tail 30
          docker stop finpilot-smoke && docker rm finpilot-smoke
          exit 1

  # ============================================
  # 📊 Scanner Test Job - Integration
  # ============================================
  scanner-integration:
    name: 📊 Scanner Integration
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📊 Test scanner module imports
        run: |
          python -c "
          from scanner import indicators, signals, data_fetcher, config
          from scanner import add_indicators, fetch, load_symbols
          print('✅ All scanner modules import successfully')
          "

      - name: 🧪 Run indicator calculations
        run: |
          python -c "
          import pandas as pd
          import numpy as np
          from scanner.indicators import ema, rsi, macd_hist, add_indicators

          # Test with sample data
          prices = pd.Series(np.random.random(100) * 50 + 100)

          assert len(ema(prices, 20)) == 100
          assert len(rsi(prices, 14)) == 100
          assert len(macd_hist(prices)) == 100

          print('✅ Indicator calculations verified')
          "

  # ============================================
  # 🤖 DRL Model Validation & Deploy Pipeline
  # ============================================
  drl-pipeline:
    name: 🤖 DRL Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install DRL dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-rl.txt 2>/dev/null || echo "No RL requirements file"

      - name: 🔍 Validate DRL module imports
        run: |
          python -c "
          try:
              from drl.config import DRLConfig
              from drl.market_env import TradingEnv
              print('✅ DRL modules import OK')
          except ImportError as e:
              print(f'⚠️ DRL import warning: {e}')
          "

      - name: 🧪 DRL unit tests
        run: |
          python -m pytest
