# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
        exclude: data/openclaw_manifest_20260416_1503\.yaml$
      - id: check-json
        exclude: \.devcontainer/devcontainer\.json$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # Ruff: format (replaces Black+isort) + lint in one tool
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-format
        args: ['--line-length=100']
      - id: ruff
        args: ['--fix', '--ignore=E501,S105,UP038']
        # Standalone offline research/backtest scripts (root-level, manually run,
        # not imported by the live app) — not held to production lint standards.
        exclude: ^(eodhd_check|fetch_and_retest|fetch_squeeze_and_analyze|paper_validate|score_lab_1_weights|score_lab_2_exits|score_lab_3_regime|analyze_enriched|backtest_signals|backtest_v2_extra)\.py$

  # Security linting with Bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ['-ll', '-ii', '--skip=B101']
        exclude: ^(tests/|archive/|scripts/)

  # Check for secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # Dockerfile linting (requires Docker daemon)
  # Disabled: hadolint-docker needs Docker which is not available in devcontainer
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.12.0
  #   hooks:
  #     - id: hadolint-docker
  #       entry: hadolint --ignore DL3008 --ignore DL3013

# CI settings
ci:
  autofix_prs: true
  autoupdate_schedule: monthly
