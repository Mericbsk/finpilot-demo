# ============================================
# 🚀 FinPilot Docker Compose Configuration
# Production-ready multi-service setup
# ============================================

services:
  # ============================================
  # 🌐 Next.js Frontend
  # ============================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: finpilot_web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - API_HOST=http://api:8000
      - NODE_ENV=production
    networks:
      - finpilot_network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # ⚡ FastAPI Backend
  # ============================================
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: finpilot_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - TZ=Europe/Istanbul
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./api:/app/api:ro
    networks:
      - finpilot_network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/ready')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ============================================
  # 📊 Streamlit Dashboard (Legacy / Optional)
  # ============================================
  finpilot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finpilot_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - TZ=Europe/Istanbul
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./user_settings.json:/app/user_settings.json:ro
      - finpilot_logs:/app/logs
    networks:
      - finpilot_network
    profiles:
      - legacy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ============================================
  # 🤖 Scanner Service - Background Job
  # ============================================
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finpilot_scanner
    restart: unless-stopped
    entrypoint: ["python", "scanner.py"]
    environment:
      - TZ=Europe/Istanbul
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - finpilot_network
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - scanner  # Only run with: docker compose --profile scanner up -d api web scanner

  # ============================================
  # 📱 Telegram Bot Service
  # ============================================
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finpilot_telegram
    restart: unless-stopped
    entrypoint: ["python", "telegram_bot_runner.py"]
    environment:
      - TZ=Europe/Istanbul
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - finpilot_network
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - telegram  # Only run with: docker compose --profile telegram up -d api web telegram_bot

  # ============================================
  # 🗄️ Redis Cache (Required by API for KPI/state/feedback persistence)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: finpilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finpilot_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # 🐘 PostgreSQL Database (Production-ready)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: finpilot_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finpilot
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finpilot_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/pg_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - finpilot_network
    profiles:
      - db  # Only run with: docker compose --profile db up -d postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot -d finpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 📈 Prometheus (monitoring profile)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: finpilot_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - finpilot_network
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============================================
  # 📊 Grafana (monitoring profile)
  # ============================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: finpilot_grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-finpilot_grafana_2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - finpilot_network
    depends_on:
      - prometheus
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3


# ============================================
networks:
  finpilot_network:
    driver: bridge

# ============================================
# 💾 Volumes
# ============================================
volumes:
  finpilot_logs:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
